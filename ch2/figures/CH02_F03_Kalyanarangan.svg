<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 403 280" width="403" height="280">
  <!-- Background -->
  <rect width="403" height="280" fill="#ffffff"/>
  
  <!-- Dividing line -->
  <line x1="201.5" y1="30" x2="201.5" y2="270" stroke="#999999" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- ===== LEFT SIDE: FIXED-POINT ===== -->
  
  <!-- Title -->
  <text x="100" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000000">Fixed-Point</text>
  
  <!-- Single ruler at bottom -->
  <g transform="translate(15, 220)">
    <!-- Ruler body -->
    <rect x="0" y="0" width="170" height="14" fill="#e8e8e8" stroke="#666666" stroke-width="0.75"/>
    <!-- Tick marks -->
    <g stroke="#333333" stroke-width="0.5">
      <line x1="5" y1="0" x2="5" y2="8"/>
      <line x1="22" y1="0" x2="22" y2="5"/>
      <line x1="39" y1="0" x2="39" y2="5"/>
      <line x1="56" y1="0" x2="56" y2="8"/>
      <line x1="73" y1="0" x2="73" y2="5"/>
      <line x1="90" y1="0" x2="90" y2="5"/>
      <line x1="107" y1="0" x2="107" y2="8"/>
      <line x1="124" y1="0" x2="124" y2="5"/>
      <line x1="141" y1="0" x2="141" y2="5"/>
      <line x1="158" y1="0" x2="158" y2="8"/>
    </g>
    <!-- Ruler numbers -->
    <text x="5" y="12" font-family="Arial, sans-serif" font-size="5" text-anchor="middle" fill="#333333">0</text>
    <text x="56" y="12" font-family="Arial, sans-serif" font-size="5" text-anchor="middle" fill="#333333">1</text>
    <text x="107" y="12" font-family="Arial, sans-serif" font-size="5" text-anchor="middle" fill="#333333">2</text>
    <text x="158" y="12" font-family="Arial, sans-serif" font-size="5" text-anchor="middle" fill="#333333">3</text>
  </g>
  
  <!-- Grain of rice (tiny, invisible on ruler) -->
  <g transform="translate(25, 185)">
    <!-- Rice grain - very small ellipse -->
    <ellipse cx="8" cy="22" rx="3" ry="1.5" fill="#f5f5dc" stroke="#999966" stroke-width="0.5"/>
    <!-- X mark above -->
    <g stroke="#cc0000" stroke-width="2" stroke-linecap="round">
      <line x1="2" y1="2" x2="14" y2="14"/>
      <line x1="14" y1="2" x2="2" y2="14"/>
    </g>
  </g>
  
  <!-- Apple (medium, but ruler can't capture detail) -->
  <g transform="translate(65, 120)">
    <!-- Apple body -->
    <ellipse cx="25" cy="60" rx="22" ry="25" fill="#cc3333" stroke="#992222" stroke-width="1"/>
    <!-- Apple highlight -->
    <ellipse cx="18" cy="50" rx="6" ry="10" fill="#dd5555" opacity="0.5"/>
    <!-- Stem -->
    <path d="M25 35 Q27 30 25 25" stroke="#663300" stroke-width="2" fill="none"/>
    <!-- Leaf -->
    <ellipse cx="30" cy="28" rx="6" ry="3" fill="#339933" transform="rotate(30 30 28)"/>
    <!-- X mark above -->
    <g stroke="#cc0000" stroke-width="2" stroke-linecap="round">
      <line x1="19" y1="2" x2="31" y2="14"/>
      <line x1="31" y1="2" x2="19" y2="14"/>
    </g>
  </g>
  
  <!-- Watermelon (too big, gets clipped) -->
  <g transform="translate(115, 95)">
    <!-- Watermelon body - extends beyond ruler -->
    <ellipse cx="45" cy="85" rx="55" ry="35" fill="#336633" stroke="#224422" stroke-width="1"/>
    <!-- Stripes -->
    <path d="M15 70 Q45 60 75 70" stroke="#225522" stroke-width="2" fill="none"/>
    <path d="M10 85 Q45 75 80 85" stroke="#225522" stroke-width="2" fill="none"/>
    <path d="M15 100 Q45 90 75 100" stroke="#225522" stroke-width="2" fill="none"/>
    <!-- Highlight -->
    <ellipse cx="30" cy="75" rx="15" ry="8" fill="#448844" opacity="0.4"/>
    <!-- X mark above -->
    <g stroke="#cc0000" stroke-width="2" stroke-linecap="round">
      <line x1="39" y1="22" x2="51" y2="34"/>
      <line x1="51" y1="22" x2="39" y2="34"/>
    </g>
    <!-- Clipping indicator - dashed line where it exceeds -->
    <line x1="70" y1="55" x2="70" y2="125" stroke="#cc0000" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- ===== RIGHT SIDE: AFFINE ===== -->
  
  <!-- Title -->
  <text x="302" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000000">Affine</text>
  
  <!-- Grain of rice with tiny custom ruler -->
  <g transform="translate(215, 55)">
    <!-- Tiny ruler -->
    <rect x="0" y="30" width="35" height="10" fill="#e8e8e8" stroke="#666666" stroke-width="0.5"/>
    <g stroke="#333333" stroke-width="0.4">
      <line x1="2" y1="30" x2="2" y2="36"/>
      <line x1="9" y1="30" x2="9" y2="34"/>
      <line x1="16" y1="30" x2="16" y2="36"/>
      <line x1="23" y1="30" x2="23" y2="34"/>
      <line x1="30" y1="30" x2="30" y2="36"/>
    </g>
    <text x="2" y="38" font-family="Arial, sans-serif" font-size="4" fill="#333333">0</text>
    <text x="16" y="38" font-family="Arial, sans-serif" font-size="4" fill="#333333">1</text>
    <text x="33" y="38" font-family="Arial, sans-serif" font-size="4" text-anchor="end" fill="#333333">2mm</text>
    <!-- Rice grain - fits perfectly -->
    <ellipse cx="17" cy="26" rx="10" ry="4" fill="#f5f5dc" stroke="#999966" stroke-width="0.5"/>
    <!-- Checkmark -->
    <g stroke="#339933" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polyline points="10,6 15,12 26,0"/>
    </g>
  </g>
  
  <!-- Apple with medium custom ruler -->
  <g transform="translate(255, 95)">
    <!-- Medium ruler -->
    <rect x="0" y="75" width="55" height="12" fill="#e8e8e8" stroke="#666666" stroke-width="0.5"/>
    <g stroke="#333333" stroke-width="0.4">
      <line x1="3" y1="75" x2="3" y2="82"/>
      <line x1="16" y1="75" x2="16" y2="80"/>
      <line x1="29" y1="75" x2="29" y2="82"/>
      <line x1="42" y1="75" x2="42" y2="80"/>
      <line x1="52" y1="75" x2="52" y2="82"/>
    </g>
    <text x="3" y="84" font-family="Arial, sans-serif" font-size="4" fill="#333333">0</text>
    <text x="29" y="84" font-family="Arial, sans-serif" font-size="4" fill="#333333">5</text>
    <text x="52" y="84" font-family="Arial, sans-serif" font-size="4" text-anchor="end" fill="#333333">10cm</text>
    <!-- Apple body -->
    <ellipse cx="27" cy="50" rx="22" ry="25" fill="#cc3333" stroke="#992222" stroke-width="1"/>
    <!-- Apple highlight -->
    <ellipse cx="20" cy="40" rx="6" ry="10" fill="#dd5555" opacity="0.5"/>
    <!-- Stem -->
    <path d="M27 25 Q29 20 27 15" stroke="#663300" stroke-width="2" fill="none"/>
    <!-- Leaf -->
    <ellipse cx="32" cy="18" rx="6" ry="3" fill="#339933" transform="rotate(30 32 18)"/>
    <!-- Checkmark -->
    <g stroke="#339933" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polyline points="20,-2 26,5 38,-8"/>
    </g>
  </g>
  
  <!-- Watermelon with large custom ruler (shifted zero-point) -->
  <g transform="translate(270, 175)">
    <!-- Large ruler - note it starts at 10, not 0 (shifted zero-point) -->
    <rect x="0" y="60" width="120" height="14" fill="#e8e8e8" stroke="#666666" stroke-width="0.75"/>
    <g stroke="#333333" stroke-width="0.5">
      <line x1="5" y1="60" x2="5" y2="68"/>
      <line x1="20" y1="60" x2="20" y2="65"/>
      <line x1="35" y1="60" x2="35" y2="68"/>
      <line x1="50" y1="60" x2="50" y2="65"/>
      <line x1="65" y1="60" x2="65" y2="68"/>
      <line x1="80" y1="60" x2="80" y2="65"/>
      <line x1="95" y1="60" x2="95" y2="68"/>
      <line x1="110" y1="60" x2="110" y2="65"/>
    </g>
    <text x="5" y="72" font-family="Arial, sans-serif" font-size="5" text-anchor="middle" fill="#333333">0</text>
    <text x="35" y="72" font-family="Arial, sans-serif" font-size="5" text-anchor="middle" fill="#333333">10</text>
    <text x="65" y="72" font-family="Arial, sans-serif" font-size="5" text-anchor="middle" fill="#333333">20</text>
    <text x="95" y="72" font-family="Arial, sans-serif" font-size="5" text-anchor="middle" fill="#333333">30</text>
    <text x="115" y="72" font-family="Arial, sans-serif" font-size="5" text-anchor="end" fill="#333333">cm</text>
    <!-- Watermelon body - fits ruler perfectly -->
    <ellipse cx="55" cy="35" rx="50" ry="28" fill="#336633" stroke="#224422" stroke-width="1"/>
    <!-- Stripes -->
    <path d="M20 22 Q55 12 90 22" stroke="#225522" stroke-width="2" fill="none"/>
    <path d="M15 35 Q55 25 95 35" stroke="#225522" stroke-width="2" fill="none"/>
    <path d="M20 48 Q55 38 90 48" stroke="#225522" stroke-width="2" fill="none"/>
    <!-- Highlight -->
    <ellipse cx="35" cy="25" rx="15" ry="8" fill="#448844" opacity="0.4"/>
    <!-- Checkmark -->
    <g stroke="#339933" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polyline points="48,-18 54,-10 66,-24"/>
    </g>
  </g>
  
  <!-- Labels explaining the concept -->
  <text x="100" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666">One rigid ruler for all objects</text>
  <text x="302" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666666">Custom ruler per object (Scale + Zero-Point)</text>
  
</svg>