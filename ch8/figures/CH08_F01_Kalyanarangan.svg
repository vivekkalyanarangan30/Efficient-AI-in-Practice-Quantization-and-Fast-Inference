<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="680" viewBox="0 0 680 680">
<style>
  text { font-family: Arial, Helvetica, sans-serif; fill: #28253d; }
  .title { font-size: 13px; font-weight: bold; }
  .subtitle { font-size: 10.5px; }
  .label { font-size: 10px; }
  .label-italic { font-size: 10.5px; font-style: italic; fill: #6e6a8a; }
  .heading { font-size: 15px; font-weight: bold; }
  .decision { fill: #fff2c6; stroke: #28253d; stroke-width: 0.8; stroke-linejoin: miter; }
  .outcome { fill: #d6edc8; stroke: #28253d; stroke-width: 1.2; stroke-linejoin: miter; }
  .root { fill: #dce6f5; stroke: #28253d; stroke-width: 1.1; stroke-linejoin: miter; }
  .special { fill: #e8e0f4; stroke: #28253d; stroke-width: 0.8; stroke-linejoin: miter; }
  .arrow { fill: none; stroke: #28253d; stroke-width: 0.9; stroke-linecap: round; }
  .dashed { fill: none; stroke: #6e6a8a; stroke-width: 0.8; stroke-dasharray: 4,2; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
    <path d="M0,0 L10,4 L0,8 Z" fill="#28253d"/>
  </marker>
</defs>

<text class="heading" x="340" y="22" text-anchor="middle">Quantization format decision tree</text>

<!-- ROOT: What is your binding deployment constraint? -->
<rect class="root" x="190" y="38" width="300" height="34" rx="17"/>
<text class="title" x="340" y="50" text-anchor="middle" dominant-baseline="central" font-size="11">What is your binding</text>
<text class="title" x="340" y="64" text-anchor="middle" dominant-baseline="central" font-size="11">deployment constraint?</text>

<!-- Arrow down -->
<line class="arrow" x1="340" y1="72" x2="340" y2="88" marker-end="url(#ah)"/>

<!-- DECISION: Need higher inference throughput? -->
<rect class="decision" x="220" y="90" width="240" height="46" rx="7"/>
<text class="title" x="340" y="107" text-anchor="middle" dominant-baseline="central">Need higher inference</text>
<text class="title" x="340" y="123" text-anchor="middle" dominant-baseline="central">throughput? Serving at scale</text>

<!-- Yes arrow to left (H100?) -->
<path class="arrow" d="M270,136 Q195,155 155,168" marker-end="url(#ah)"/>
<text class="label" x="195" y="153" text-anchor="middle">Yes</text>

<!-- No arrow to right (Fine-tune?) -->
<path class="arrow" d="M410,136 Q475,155 510,168" marker-end="url(#ah)"/>
<text class="label" x="478" y="153" text-anchor="middle">No</text>

<!-- DECISION: H100 or later available? -->
<rect class="decision" x="40" y="170" width="200" height="44" rx="7"/>
<text class="title" x="140" y="188" text-anchor="middle" dominant-baseline="central">H100 or later</text>
<text class="title" x="140" y="203" text-anchor="middle" dominant-baseline="central">available?</text>

<!-- DECISION: Need to fine-tune on consumer GPU? -->
<rect class="decision" x="400" y="170" width="240" height="50" rx="7"/>
<text class="title" x="520" y="186" text-anchor="middle" dominant-baseline="central">Need to fine-tune on</text>
<text class="title" x="520" y="200" text-anchor="middle" dominant-baseline="central">consumer GPU?</text>
<text class="subtitle" x="520" y="214" text-anchor="middle" dominant-baseline="central">≤16 GB VRAM</text>

<!-- H100: Yes arrow left to FP8 -->
<path class="arrow" d="M95,214 Q65,232 55,248" marker-end="url(#ah)"/>
<text class="label" x="60" y="232" text-anchor="middle">Yes</text>

<!-- H100: No arrow down-right to Stay with INT4 -->
<!-- Routed to avoid NF4 box: goes down then bends left under NF4 -->
<path class="arrow" d="M190,214 L190,310 L175,320" marker-end="url(#ah)"/>
<text class="label" x="200" y="260" text-anchor="start">No</text>

<!-- OUTCOME: FP8 E4M3 -->
<rect class="outcome" x="5" y="250" width="140" height="56" rx="7"/>
<text class="title" x="75" y="266" text-anchor="middle" dominant-baseline="central">FP8 E4M3</text>
<text class="subtitle" x="75" y="282" text-anchor="middle" dominant-baseline="central">2× BF16 throughput</text>
<text class="subtitle" x="75" y="296" text-anchor="middle" dominant-baseline="central">vLLM one-flag deploy</text>

<!-- Fine-tune: Yes arrow to NF4 -->
<path class="arrow" d="M460,220 Q390,245 360,255" marker-end="url(#ah)"/>
<text class="label" x="400" y="237" text-anchor="middle">Yes</text>

<!-- Fine-tune: No arrow right to CPU-only -->
<path class="arrow" d="M580,220 Q595,240 595,255" marker-end="url(#ah)"/>
<text class="label" x="610" y="242" text-anchor="middle">No</text>

<!-- OUTCOME: NF4 + QLoRA -->
<rect class="outcome" x="245" y="253" width="170" height="56" rx="7"/>
<text class="title" x="330" y="269" text-anchor="middle" dominant-baseline="central">NF4 + QLoRA</text>
<text class="subtitle" x="330" y="285" text-anchor="middle" dominant-baseline="central">~3.5 GB base model</text>
<text class="subtitle" x="330" y="299" text-anchor="middle" dominant-baseline="central">Train adapters in FP16</text>

<!-- DECISION: Targeting CPU-only edge deployment? -->
<rect class="decision" x="495" y="257" width="180" height="56" rx="7"/>
<text class="title" x="585" y="273" text-anchor="middle" dominant-baseline="central">Targeting CPU-only</text>
<text class="title" x="585" y="287" text-anchor="middle" dominant-baseline="central">edge deployment?</text>
<text class="subtitle" x="585" y="301" text-anchor="middle" dominant-baseline="central">No GPU budget</text>

<!-- CPU-only: No arrow curving to Stay with INT4 -->
<path class="arrow" d="M530,313 Q370,335 230,340" marker-end="url(#ah)"/>
<text class="label" x="400" y="327" text-anchor="middle">No</text>

<!-- OUTCOME: Stay with INT4 GPTQ/AWQ -->
<rect class="outcome" x="100" y="318" width="130" height="44" rx="7"/>
<text class="title" x="165" y="334" text-anchor="middle" dominant-baseline="central">Stay with INT4</text>
<text class="subtitle" x="165" y="350" text-anchor="middle" dominant-baseline="central">GPTQ / AWQ</text>

<!-- CPU-only: Yes arrow down to train/fine-tune -->
<path class="arrow" d="M585,313 L530,340" marker-end="url(#ah)"/>
<text class="label" x="575" y="327" text-anchor="middle">Yes</text>

<!-- DECISION: Can you train or fine-tune? -->
<rect class="decision" x="420" y="342" width="220" height="40" rx="7"/>
<text class="title" x="530" y="362" text-anchor="middle" dominant-baseline="central">Can you train or fine-tune?</text>

<!-- ==================== THREE-WAY BRANCH ==================== -->

<!-- Train from scratch (left) -->
<path class="arrow" d="M470,382 L350,410" marker-end="url(#ah)"/>
<text class="label" x="385" y="396" text-anchor="middle">Train from scratch</text>

<!-- Fine-tune only (center) -->
<line class="arrow" x1="530" y1="382" x2="530" y2="410" marker-end="url(#ah)"/>
<text class="label" x="505" y="400" text-anchor="end">Fine-tune</text>

<!-- Neither (right) -->
<path class="arrow" d="M600,382 L625,395 L625,410" marker-end="url(#ah)"/>
<text class="label" x="643" y="400" text-anchor="start">Neither</text>

<!-- OUTCOME: Ternary · BitNet b1.58 -->
<rect class="outcome" x="250" y="412" width="175" height="56" rx="7"/>
<text class="title" x="337" y="428" text-anchor="middle" dominant-baseline="central">Ternary · BitNet b1.58</text>
<text class="subtitle" x="337" y="444" text-anchor="middle" dominant-baseline="central">1.58 bits/weight</text>
<text class="subtitle" x="337" y="458" text-anchor="middle" dominant-baseline="central">Add/subtract only</text>

<!-- OUTCOME: QAT 1.58-bit -->
<rect class="outcome" x="460" y="412" width="140" height="56" rx="7"/>
<text class="title" x="530" y="428" text-anchor="middle" dominant-baseline="central">QAT 1.58-bit</text>
<text class="subtitle" x="530" y="444" text-anchor="middle" dominant-baseline="central">From BF16 checkpoint</text>
<text class="subtitle" x="530" y="458" text-anchor="middle" dominant-baseline="central">10B–100B tokens</text>

<!-- OUTCOME: INT4 GPTQ/AWQ + GGUF for CPU — properly sized -->
<rect class="outcome" x="608" y="412" width="68" height="56" rx="7"/>
<text class="title" x="642" y="427" text-anchor="middle" dominant-baseline="central" font-size="10">INT4</text>
<text class="subtitle" x="642" y="441" text-anchor="middle" dominant-baseline="central" font-size="9">GPTQ/AWQ</text>
<text class="subtitle" x="642" y="455" text-anchor="middle" dominant-baseline="central" font-size="9">+ GGUF</text>
<text class="subtitle" x="642" y="467" text-anchor="middle" dominant-baseline="central" font-size="9">for CPU</text>

<!-- ===== DASHED LINE: Format chosen ===== -->
<line class="dashed" x1="30" y1="497" x2="220" y2="497"/>
<text class="label-italic" x="340" y="501" text-anchor="middle">Format chosen</text>
<line class="dashed" x1="460" y1="497" x2="650" y2="497"/>

<!-- Arrow down from dashed line -->
<line class="arrow" x1="340" y1="510" x2="340" y2="528" marker-end="url(#ah)"/>

<!-- DECISION: Blackwell available? -->
<rect class="decision" x="252" y="530" width="176" height="36" rx="7"/>
<text class="title" x="340" y="548" text-anchor="middle" dominant-baseline="central">Blackwell available?</text>

<!-- Blackwell: Yes arrow left -->
<path class="arrow" d="M290,566 Q230,590 185,600" marker-end="url(#ah)"/>
<text class="label" x="220" y="586" text-anchor="middle">Yes</text>

<!-- Blackwell: No arrow right -->
<path class="arrow" d="M390,566 Q445,590 478,600" marker-end="url(#ah)"/>
<text class="label" x="455" y="586" text-anchor="middle">No</text>

<!-- SPECIAL: Consider NVFP4 -->
<rect class="special" x="65" y="602" width="175" height="44" rx="7"/>
<text class="title" x="152" y="618" text-anchor="middle" dominant-baseline="central">Consider NVFP4</text>
<text class="subtitle" x="152" y="634" text-anchor="middle" dominant-baseline="central">E2M1 block-16</text>

<!-- Arrow from NVFP4 to Deploy -->
<line class="arrow" x1="240" y1="624" x2="438" y2="624" marker-end="url(#ah)"/>

<!-- OUTCOME: Deploy (pill) -->
<rect class="outcome" x="440" y="604" width="100" height="40" rx="20"/>
<text class="title" x="490" y="624" text-anchor="middle" dominant-baseline="central">Deploy</text>

</svg>
